{% extends "base.html" %}
{% block title %}Catálogo{% endblock %}
{% block page_title %}Catálogo{% endblock %}
{% block content %}
<div class="card" style="max-width:500px;">
  <div class="card-header">✏️ Formulario</div>
  <div class="card-body">
    <form method="post">{% csrf_token %}
      {% for field in form %}
      <div style="margin-bottom:14px;"><label class="form-label">{{ field.label }}</label>{{ field }}</div>
      {% endfor %}
      <div style="display:flex;gap:10px;margin-top:20px;">
        <button type="submit" class="btn-institucional">💾 Guardar</button>
        <a href="javascript:history.back()" class="btn-outline">✕ Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
